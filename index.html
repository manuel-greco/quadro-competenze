<!doctype html>
<html lang="it">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Quadro Competenze - Home Hub</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="hub-body">
        <header class="hub-header">
            <h1>Hub Competenze Digitali & Sostenibilità</h1>
            <p>
                Seleziona un'aree/area del framework europeo
                <strong>DigComp 2.2</strong> per esplorare i dettagli e le
                connessioni con l'<strong>Agenda 2030</strong>.
            </p>
        </header>

        <main class="hub-main">
            <div class="pentagon-container large-hub">
                <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
                    <a
                        href="aree/area1.html"
                        title="Vai all'Argomento 1: Alfabetizzazione su dati e informazioni"
                    >
                        <g class="spicchio">
                            <path
                                d="M 250 210 L 331 269 L 443 187 L 257 53 Z"
                                fill="#dcb12d"
                            />
                            <circle
                                cx="350"
                                cy="120"
                                r="22"
                                fill="#dcb12d"
                                stroke="#ffffff"
                                stroke-width="4"
                                class="badge-circle"
                            />
                            <text x="350" y="120" class="badge-text">1</text>
                        </g>
                    </a>

                    <a
                        href="aree/area2.html"
                        title="Vai all'Argomento 2: Comunicazione e collaborazione"
                    >
                        <g class="spicchio">
                            <path
                                d="M 331 269 L 300 365 L 366 470 L 443 187 Z"
                                fill="#4a90e2"
                            />
                            <circle
                                cx="360"
                                cy="320"
                                r="22"
                                fill="#4a90e2"
                                stroke="#ffffff"
                                stroke-width="4"
                                class="badge-circle"
                            />
                            <text
                                x="360"
                                y="320"
                                class="badge-text"
                                style="fill: #ffffff"
                            >
                                2
                            </text>
                        </g>
                    </a>

                    <a
                        href="aree/area3.html"
                        title="Vai all'Argomento 3: Creazione di contenuti digitali"
                    >
                        <g class="spicchio">
                            <path
                                d="M 300 365 L 200 365 L 134 470 L 366 470 Z"
                                fill="#f39c12"
                            />
                            <circle
                                cx="250"
                                cy="420"
                                r="22"
                                fill="#f39c12"
                                stroke="#ffffff"
                                stroke-width="4"
                                class="badge-circle"
                            />
                            <text
                                x="250"
                                y="420"
                                class="badge-text"
                                style="fill: #ffffff"
                            >
                                3
                            </text>
                        </g>
                    </a>

                    <a
                        href="aree/area4.html"
                        title="Vai all'Argomento 4: Sicurezza"
                    >
                        <g class="spicchio">
                            <path
                                d="M 200 365 L 169 269 L 57 187 L 134 470 Z"
                                fill="#2ecc71"
                            />
                            <circle
                                cx="140"
                                cy="320"
                                r="22"
                                fill="#2ecc71"
                                stroke="#ffffff"
                                stroke-width="4"
                                class="badge-circle"
                            />
                            <text
                                x="140"
                                y="320"
                                class="badge-text"
                                style="fill: #ffffff"
                            >
                                4
                            </text>
                        </g>
                    </a>

                    <a
                        href="aree/area5.html"
                        title="Vai all'Argomento 5: Risoluzione di problemi"
                    >
                        <g class="spicchio">
                            <path
                                d="M 169 269 L 250 210 L 243 53 L 57 187 Z"
                                fill="#e74c3c"
                            />
                            <circle
                                cx="150"
                                cy="120"
                                r="22"
                                fill="#e74c3c"
                                stroke="#ffffff"
                                stroke-width="4"
                                class="badge-circle"
                            />
                            <text
                                x="150"
                                y="120"
                                class="badge-text"
                                style="fill: #ffffff"
                            >
                                5
                            </text>
                        </g>
                    </a>

                    <a href="index.html" title="Torna alla Home">
                        <polygon
                            class="spicchio"
                            points="250,210 331,269 300,365 200,365 169,269"
                            fill="#212a57"
                        />
                    </a>
                </svg>
            </div>
        </main>

        <footer class="hub-footer">
            <p>
                Target Unione Europea: Sviluppare competenze digitali di base
                per l'80% dei cittadini entro il 2030.
            </p>
        </footer>
    </body>
</html>
